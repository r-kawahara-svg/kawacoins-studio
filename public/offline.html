<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>オフライン — 記事スタジオ</title>
<style>
  body { font-family: "Noto Sans JP", sans-serif; background: #e9ecf0; color: #161d2b;
    display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { text-align: center; padding: 40px 24px; }
  h1 { font-size: 20px; font-weight: 700; margin: 16px 0 8px; }
  p { color: #697587; font-size: 14px; line-height: 1.7; }
  button { margin-top: 20px; background: #0f766b; color: #fff; border: none;
    border-radius: 10px; padding: 12px 28px; font-size: 15px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div class="box">
  <div style="font-size:48px">📡</div>
  <h1>オフラインです</h1>
  <p>インターネットに接続されていません。<br>接続を確認してから再試行してください。</p>
  <button onclick="location.reload()">再試行</button>
</div>
</body>
</html>
